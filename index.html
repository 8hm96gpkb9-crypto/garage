<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Каталог вещей</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  /*  ===== ТОКЕНЫ =====  */
  :root{
    --paper: #EDEAE1;
    --paper-2: #E4DFD2;
    --ink: #2A2721;
    --ink-soft: #6b6558;
    --brick: #96473A;
    --sage: #6E7C5C;
    --mustard: #C99A3B;
    --line: #C9C2B4;
    --card-bg: #F6F3EB;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Segoe UI', 'Work Sans', system-ui, sans-serif;
    -webkit-tap-highlight-color: transparent;
  }

  @font-face {
    font-family: 'FrauncesFallback';
    src: local('Georgia');
  }

  .display {
    font-family: Georgia, 'Iowan Old Style', serif;
    font-weight: 700;
    letter-spacing: -0.01em;
  }

  .mono {
    font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
  }

  .hidden { display: none !important; }

  /* ===== ШАПКА ===== */
  .topbar {
    padding: 18px 16px 10px;
    background: var(--paper);
    position: sticky; top: 0; z-index: 5;
    border-bottom: 1px dashed var(--line);
  }
  .topbar h1 {
    margin: 0;
    font-size: 22px;
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .topbar .count {
    font-size: 12px;
    color: var(--ink-soft);
    font-family: 'SFMono-Regular', Consolas, monospace;
  }
  .topbar p {
    margin: 4px 0 0;
    font-size: 13px;
    color: var(--ink-soft);
  }

  /* ===== СЕТКА КАРТОЧЕК ===== */
  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
    padding: 16px;
  }

  .card {
    position: relative;
    background: var(--card-bg);
    border: 1px dashed var(--line);
    border-radius: 3px;
    padding: 10px 10px 12px;
    cursor: pointer;
    transition: transform .15s ease, box-shadow .15s ease;
  }
  .card:nth-child(odd)  { transform: rotate(-0.6deg); }
  .card:nth-child(even) { transform: rotate(0.6deg); }
  .card:active { transform: scale(0.97); }

  .card::before {
    content: "";
    position: absolute;
    top: 8px; left: 8px;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--paper);
    border: 1px solid var(--line);
  }

  .card .tagno {
    display: block;
    text-align: right;
    font-size: 10px;
    color: var(--ink-soft);
    margin-bottom: 4px;
  }

  .photo {
    width: 100%;
    aspect-ratio: 1 / 1;
    border-radius: 2px;
    overflow: hidden;
    background: var(--paper-2);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 8px;
    position: relative;
  }
  .photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .photo .ph-letter {
    font-size: 34px;
    font-weight: 700;
    color: rgba(0,0,0,0.18);
  }

  .card .name {
    font-size: 14px;
    line-height: 1.25;
    margin: 0 0 6px;
  }

  .card .price {
    display: inline-block;
    font-size: 13px;
    padding: 2px 6px;
    border: 1px solid var(--ink);
    border-radius: 2px;
  }

  .card.reserved .photo { opacity: 0.45; }
  .card.reserved::after {
    content: "БРОНЬ";
    position: absolute;
    top: 46%; left: -8px;
    background: var(--brick);
    color: #fff;
    font-size: 10px;
    letter-spacing: 0.08em;
    padding: 2px 20px;
    transform: rotate(-8deg);
    box-shadow: 0 1px 2px rgba(0,0,0,0.2);
  }

  .card.sold .photo {
  opacity: 0.55;
  filter: grayscale(1);
}
.card.sold .photo::after {
  content: "ПРОДАНО";
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%) rotate(-13deg);
  border: 3px solid var(--ink);
  color: var(--ink);
  background: rgba(246, 243, 235, 0.9);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.1em;
  padding: 5px 12px;
  border-radius: 4px;
  white-space: nowrap;
}
.card.sold .name { color: var(--ink-soft); }
.card.sold .price {
  text-decoration: line-through;
  color: var(--ink-soft);
  border-color: var(--line);
}
  
  .empty {
    grid-column: 1 / -1;
    text-align: center;
    color: var(--ink-soft);
    padding: 40px 10px;
    font-size: 14px;
  }

  /* ===== КАРТОЧКА ТОВАРА (детально) ===== */
  .detail {
    padding: 0 0 24px;
  }
.detail .back {
  margin: 14px 0 4px 16px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--ink-soft);
  font-size: 13px;
  font-weight: 700 !important;
  cursor: pointer;
  border: none;
  background: none;
  padding: 6px 4px;
}

  .detail .photo-big {
    margin: 8px 16px 0;
    aspect-ratio: 4 / 3;
    border-radius: 4px;
    overflow: hidden;
    background: var(--paper-2);
    display: flex; align-items: center; justify-content: center;
    border: 1px dashed var(--line);
  }
  .detail .photo-big img { width: 100%; height: 100%; object-fit: cover; }
  .detail .photo-big .ph-letter { font-size: 64px; color: rgba(0,0,0,0.15); }

  .detail .photo-big.sold { filter: grayscale(1); opacity: 0.6; }
  .detail .photo-big.sold::after {
    content: "ПРОДАНО";
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) rotate(-13deg);
    border: 4px solid var(--ink);
    color: var(--ink);
    background: rgba(246, 243, 235, 0.9);
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.12em;
    padding: 8px 20px;
    border-radius: 6px;
    white-space: nowrap;
    pointer-events: none;
  }

  .thumbrow {
    display: flex; gap: 8px;
    margin: 8px 16px 0;
    overflow-x: auto;
  }
  .thumbrow img {
    width: 56px; height: 56px; object-fit: cover;
    border-radius: 3px; border: 1px solid var(--line);
    flex: 0 0 auto;
    cursor: pointer;
  }

  .detail .info {
    margin: 18px 16px 0;
    padding-top: 14px;
    border-top: 1px dashed var(--line);
  }

  .detail .tagno-big {
    font-size: 11px;
    color: var(--ink-soft);
    margin: 0 0 4px;
  }

  .detail h2 {
    margin: 0 0 10px;
    font-size: 21px;
    line-height: 1.25;
  }

  .stamp {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border: 2px solid var(--mustard);
    color: var(--mustard);
    border-radius: 999px;
    padding: 6px 16px;
    font-size: 16px;
    font-weight: 700;
    transform: rotate(-3deg);
    margin-bottom: 14px;
  }
  .stamp.sold {
    border-color: var(--ink-soft);
    color: var(--ink-soft);
    text-decoration: line-through;
  }

  .detail .desc {
    font-size: 14.5px;
    line-height: 1.55;
    color: var(--ink);
    white-space: pre-line;
    margin-bottom: 22px;
  }

  .reserve-btn {
    width: calc(100% - 32px);
    margin: 0 16px;
    display: block;
    background: var(--brick);
    color: #fff;
    border: none;
    border-radius: 4px;
    padding: 15px;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.01em;
    cursor: pointer;
  }
  .reserve-btn:active { opacity: 0.85; }
  .reserve-btn[disabled] {
    background: var(--ink-soft);
    cursor: not-allowed;
  }

  .reserve-hint {
    margin: 8px 16px 0;
    font-size: 12px;
    line-height: 1.4;
    color: var(--ink-soft);
    text-align: center;
  }

  .toast {
    position: fixed;
    left: 16px; right: 16px; bottom: 20px;
    background: var(--ink);
    color: var(--paper);
    padding: 12px 16px;
    border-radius: 6px;
    font-size: 14px;
    text-align: center;
    box-shadow: 0 4px 14px rgba(0,0,0,0.25);
    z-index: 20;
  }

  /* ===== ЛАЙТБОКС (полноэкранный просмотр фото) ===== */
  .photo-zoom-hint {
    position: absolute;
    bottom: 10px; right: 10px;
    width: 32px; height: 32px;
    border-radius: 50%;
    background: rgba(0,0,0,0.45);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    pointer-events: none;
  }

  .lightbox {
    position: fixed;
    inset: 0;
    background: rgba(10, 9, 7, 0.94);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 50;
    touch-action: pan-y;
  }
  .lightbox img {
    max-width: 92vw;
    max-height: 78vh;
    object-fit: contain;
    user-select: none;
    -webkit-user-drag: none;
  }
  .lb-close {
    position: absolute;
    top: 16px; right: 16px;
    background: rgba(255,255,255,0.12);
    border: none;
    color: #fff;
    font-size: 20px;
    width: 40px; height: 40px;
    border-radius: 50%;
    cursor: pointer;
  }
  .lb-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255,255,255,0.12);
    border: none;
    color: #fff;
    font-size: 26px;
    width: 44px; height: 44px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .lb-prev { left: 10px; }
  .lb-next { right: 10px; }
  .lb-counter {
    position: absolute;
    bottom: 22px;
    left: 0; right: 0;
    text-align: center;
    color: rgba(255,255,255,0.75);
    font-size: 12px;
    font-family: 'SFMono-Regular', Consolas, monospace;
  }
</style>
</head>
<body>

<div id="app">

  <header class="topbar">
    <h1 class="display">Гаражная распродажа <span class="count mono" id="itemCount"></span></h1>
    <p>Нажми на вещь, чтобы посмотреть детали и забронировать</p>
  </header>

  <main id="grid-view" class="grid"><div class="empty">Загрузка каталога…</div></main>

  <section id="detail-view" class="detail hidden">
    <button class="back" onclick="showGrid()">← назад к каталогу</button>
    <div class="photo-big" id="detailPhotoBig"></div>
    <div class="thumbrow" id="detailThumbs"></div>
    <div class="info">
      <p class="tagno-big mono" id="detailTagNo"></p>
      <h2 class="display" id="detailName"></h2>
      <div class="stamp mono" id="detailPrice"></div>
      <p class="desc" id="detailDesc"></p>
    </div>
    <button class="reserve-btn" id="reserveBtn">Забронировать</button>
    <p class="reserve-hint">При нажатии на кнопку "Забронировать" - продавцу будет отправлено сообщение с названием товара и вашим профилем в Telegram</p>
  </section>

</div>

<div id="lightbox" class="lightbox hidden">
  <button class="lb-close" id="lbClose">✕</button>
  <button class="lb-nav lb-prev" id="lbPrev">‹</button>
  <img id="lbImg" src="" alt="">
  <button class="lb-nav lb-next" id="lbNext">›</button>
  <p class="lb-counter" id="lbCounter"></p>
</div>

<script>
/* =========================================================================
   ТОВАРЫ теперь редактируются не здесь, а в отдельном файле products.json
   (лежит рядом с этим index.html). Формат такой же, только каждое поле
   в кавычках (это JSON, а не обычный JS):

   {
     "id": 1,
     "name": "Название",
     "price": "10 €",
     "category": "Техника",
     "photos": [],
     "description": "Описание.\nМожно с переносами строк через \\n",
     "reserved": false,
     "sold": false
   }
========================================================================= */

let PRODUCTS = [];

async function loadProducts(){
  try {
    // ?_=... — чтобы браузер не показывал закэшированную старую версию файла
    const res = await fetch('products.json?_=' + Date.now());
    PRODUCTS = await res.json();
  } catch (e) {
    console.error('Не удалось загрузить products.json', e);
    PRODUCTS = [];
  }
  renderGrid();
}

/* ========================= РЕНДЕР ========================= */

const tg = window.Telegram ? window.Telegram.WebApp : null;
if (tg) { tg.ready(); tg.expand(); }

/* ===== СТАТИСТИКА =====
   Укажи сюда публичный адрес своего бота на Railway (тот, что появится
   после включения "Generate Domain" в Settings → Networking), например:
   const TRACK_URL = "https://твой-бот.up.railway.app/track";
   Если оставить пустым — сайт просто не будет отправлять статистику,
   на работу каталога и брони это никак не влияет. */
const TRACK_URL = "https://botforsales-production.up.railway.app/track";

function track(event, extra = {}){
  if (!TRACK_URL) return;
  const tgUser = (tg && tg.initDataUnsafe && tg.initDataUnsafe.user) || {};
  const payload = {
    event,
    user_id: tgUser.id || null,
    username: tgUser.username ? '@' + tgUser.username : (tgUser.first_name || null),
    ...extra
  };
  try {
    fetch(TRACK_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(payload)
    });
  } catch (e) { /* тихо игнорируем — статистика не должна ломать каталог */ }
}

track('open_catalog');

const gridView = document.getElementById('grid-view');
const detailView = document.getElementById('detail-view');
const itemCount = document.getElementById('itemCount');

function pastelFor(str){
  let hash = 0;
  for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
  const h = Math.abs(hash) % 360;
  return `hsl(${h}, 35%, 82%)`;
}

function photoNode(product, big){
  const wrap = document.createElement('div');
  wrap.className = big ? '' : 'photo';
  if (product.photos && product.photos.length){
    const img = document.createElement('img');
    img.src = product.photos[0];
    img.alt = product.name;
    wrap.appendChild(img);
  } else {
    wrap.style.background = pastelFor(product.name);
    const letter = document.createElement('span');
    letter.className = 'ph-letter';
    letter.textContent = product.name.trim().charAt(0).toUpperCase();
    wrap.appendChild(letter);
  }
  return wrap;
}

function renderGrid(){
  gridView.innerHTML = '';

  const sorted = [...PRODUCTS].sort((a, b) => a.id - b.id);

  itemCount.textContent = `· ${sorted.length} вещей`;

  if (!sorted.length){
    gridView.innerHTML = '<div class="empty">Пока пусто. Добавь товары в файл products.json.</div>';
    return;
  }

  sorted.forEach((p, idx) => {
    const card = document.createElement('div');
    const statusClass = p.sold ? ' sold' : (p.reserved ? ' reserved' : '');
    card.className = 'card' + statusClass;
    card.onclick = () => showDetail(p);

    const tagno = document.createElement('span');
    tagno.className = 'tagno mono';
    tagno.textContent = '№' + String(p.id).padStart(3, '0');
    card.appendChild(tagno);

    card.appendChild(photoNode(p, false));

    const name = document.createElement('p');
    name.className = 'name';
    name.textContent = p.name;
    card.appendChild(name);

    const price = document.createElement('span');
    price.className = 'price mono';
    price.textContent = p.price;
    card.appendChild(price);

    gridView.appendChild(card);
  });
}

let activePhotos = [];
let activePhotoIndex = 0;

function setMainPhoto(index){
  activePhotoIndex = index;
  const big = document.getElementById('detailPhotoBig');
  big.innerHTML = '';
  const img = document.createElement('img');
  img.src = activePhotos[index];
  img.style.width = '100%';
  img.style.height = '100%';
  img.style.objectFit = 'cover';
  big.appendChild(img);
  const hint = document.createElement('span');
  hint.className = 'photo-zoom-hint';
  hint.textContent = '⤢';
  big.appendChild(hint);
}

let savedScrollY = 0;
  
function showDetail(p){
  savedScrollY = window.scrollY;
  track('view_product', { product_id: p.id });
  
document.getElementById('detailTagNo').textContent = '№' + String(p.id).padStart(3, '0') + (p.category ? ' · ' + p.category : '');
  document.getElementById('detailName').textContent = p.name;
  const priceEl = document.getElementById('detailPrice');
  priceEl.textContent = p.price;
  priceEl.classList.toggle('sold', !!p.sold);
  document.getElementById('detailDesc').textContent = p.description || '';

  const big = document.getElementById('detailPhotoBig');
  big.innerHTML = '';
  big.style.position = 'relative';
  big.classList.toggle('sold', !!p.sold);

  activePhotos = (p.photos && p.photos.length) ? p.photos : [];

  if (activePhotos.length){
    setMainPhoto(0);
    big.style.cursor = 'pointer';
    big.onclick = () => openLightbox(activePhotos, activePhotoIndex);
  } else {
    big.appendChild(photoNode(p, true));
    big.style.cursor = 'default';
    big.onclick = null;
  }

  const thumbs = document.getElementById('detailThumbs');
  thumbs.innerHTML = '';
  if (activePhotos.length > 1){
    activePhotos.forEach((src, idx) => {
      const img = document.createElement('img');
      img.src = src;
      img.onclick = () => setMainPhoto(idx);
      thumbs.appendChild(img);
    });
  }

  const btn = document.getElementById('reserveBtn');
  if (p.sold){
    btn.textContent = 'Продано';
    btn.disabled = true;
    btn.onclick = null;
  } else if (p.reserved){
    btn.textContent = 'Уже забронировано';
    btn.disabled = true;
    btn.onclick = null;
  } else {
    btn.textContent = 'Забронировать';
    btn.disabled = false;
    btn.onclick = () => reserve(p);
  }

  gridView.classList.add('hidden');
  detailView.classList.remove('hidden');
  window.scrollTo(0, 0);
}

/* ========================= ЛАЙТБОКС (полноэкранное фото) ========================= */

let lightboxPhotos = [];
let lightboxIndex = 0;
const lightboxEl = document.getElementById('lightbox');
const lbImg = document.getElementById('lbImg');
const lbCounter = document.getElementById('lbCounter');
const lbPrevBtn = document.getElementById('lbPrev');
const lbNextBtn = document.getElementById('lbNext');

function openLightbox(photos, index){
  if (!photos || !photos.length) return;
  lightboxPhotos = photos;
  lightboxIndex = index;
  updateLightbox();
  lightboxEl.classList.remove('hidden');
}

function updateLightbox(){
  lbImg.src = lightboxPhotos[lightboxIndex];
  const multi = lightboxPhotos.length > 1;
  lbCounter.textContent = multi ? `${lightboxIndex + 1} / ${lightboxPhotos.length}` : '';
  lbPrevBtn.style.display = multi ? 'flex' : 'none';
  lbNextBtn.style.display = multi ? 'flex' : 'none';
}

function closeLightbox(){
  lightboxEl.classList.add('hidden');
}

function lbNext(){
  lightboxIndex = (lightboxIndex + 1) % lightboxPhotos.length;
  updateLightbox();
}

function lbPrev(){
  lightboxIndex = (lightboxIndex - 1 + lightboxPhotos.length) % lightboxPhotos.length;
  updateLightbox();
}

document.getElementById('lbClose').onclick = closeLightbox;
lbNextBtn.onclick = lbNext;
lbPrevBtn.onclick = lbPrev;
lightboxEl.addEventListener('click', (e) => {
  if (e.target === lightboxEl) closeLightbox();
});
document.addEventListener('keydown', (e) => {
  if (lightboxEl.classList.contains('hidden')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowRight') lbNext();
  if (e.key === 'ArrowLeft') lbPrev();
});

function showGrid(){
  detailView.classList.add('hidden');
  gridView.classList.remove('hidden');
  window.scrollTo(0, savedScrollY);
}

function showToast(msg){
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

function reserve(p){
  const payload = { id: p.id, name: p.name, price: p.price };

  if (tg && tg.sendData){
    // Отправляем данные боту — бот перешлёт их продавцу и закроет мини-приложение
    tg.sendData(JSON.stringify(payload));
  } else {
    // Если открыто не в Telegram (например, для теста в браузере)
    showToast(`Демо-режим: заявка на «${p.name}» отправит продавцу`);
  }
}

loadProducts();
</script>
</body>
</html>
